<!DOCTYPE html>
<html>
<head>
  <title>{{title}}</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="background"></div>
  <div id="instructionsOverlay">
    <div id="instructionsBox">
      <h2>How to Play</h2>
      <div id="instructionsText"></div>
      <button id="startButton">Start Game</button>
    </div>
  </div>
  <h1>{{title}}</h1>
  <div id="game">
    <div id="grid"></div>
    <div id="stats">
      <p>Moves: <span id="moveCounter">0</span></p>
      <p>Best: <span id="bestMoves"></span></p>
      <p id="seedInfo">Seed Date: <span id="gameDate"></span></p>
    </div>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
